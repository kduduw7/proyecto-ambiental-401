<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proyecto Ambiental 401 — Somos la ola del cambio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500&display=swap');

    :root {
      --ocean:    #0a7ea4;
      --foam:     #e8f7f0;
      --sand:     #f5f0e8;
      --kelp:     #1e5c3a;
      --wave:     #23a6d5;
      --white:    #ffffff;
      --dark:     #0d1f2d;
      --recycle:  #4caf78;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--dark);
      background: var(--white);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      background: rgba(10, 31, 45, 0.92);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 2.5rem;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 0.7rem;
      font-family: 'Playfair Display', serif;
      color: var(--white); font-size: 1.1rem; font-weight: 700;
      text-decoration: none;
    }
    .nav-logo .wave-icon {
      display: inline-block; font-size: 1.4rem;
    }
    nav ul {
      list-style: none; display: flex; gap: 2rem;
    }
    nav ul a {
      color: rgba(255,255,255,0.8); text-decoration: none;
      font-size: 0.85rem; letter-spacing: 0.05em; text-transform: uppercase;
      transition: color 0.2s;
    }
    nav ul a:hover { color: var(--recycle); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d1f2d 0%, #0a4a6e 50%, #0a7ea4 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      position: relative; overflow: hidden;
    }

    /* animated wave SVG at bottom */
    .hero-waves {
      position: absolute; bottom: 0; left: 0; width: 100%;
    }

    /* recycling symbol big */
    .hero-symbol {
      font-size: 6rem; margin-bottom: 1.2rem;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-18px); }
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      color: var(--white); line-height: 1.1;
      margin-bottom: 0.6rem;
    }
    .hero h1 span { color: var(--recycle); }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      color: rgba(255,255,255,0.75);
      font-weight: 300; letter-spacing: 0.08em;
      margin-bottom: 2.5rem;
      font-style: italic;
    }

    .hero-badges {
      display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
      margin-bottom: 2.5rem;
    }
    .badge {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--white); padding: 0.4rem 1rem;
      border-radius: 999px; font-size: 0.8rem;
    }

    .btn-primary {
      background: var(--recycle); color: var(--white);
      padding: 0.9rem 2.5rem; border-radius: 999px;
      text-decoration: none; font-weight: 500; font-size: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(76,175,120,0.4);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(76,175,120,0.5); }

    /* ── SECTIONS ── */
    section { padding: 5rem 1.5rem; }

    .container { max-width: 1000px; margin: 0 auto; }

    .section-label {
      font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--recycle); font-weight: 500; margin-bottom: 0.5rem;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--dark); line-height: 1.2; margin-bottom: 1.2rem;
    }
